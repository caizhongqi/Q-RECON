seed: 31
output_dir: outputs/gifteval_patchtst

dataset:
  name: gift_eval
  max_samples: 128
  context: 96
  horizon: 24
  streaming: true

victim:
  architecture: patchtst
  patch_len: 16
  stride: 8
  padding_patch: true
  d_model: 64
  n_heads: 4
  e_layers: 3
  d_ff: 128
  dropout: 0.1
  head_dropout: 0.0
  revin: true
  individual_head: false

training:
  epochs: 10
  batch_size: 16
  optimizer: adamw
  learning_rate: 0.0005
  weight_decay: 0.01
  gradient_clip_norm: 1.0

attack:
  method: gradient_matching
  prior: direct
  known_target: true
  steps: 200
  learning_rate: 0.03
  regularization: 0.001

identifiability:
  max_input_dimension: 128
