name: ett-cross-dataset-publication

on:
  push:
    branches: ["agent/**"]
    paths:
      - ".github/workflows/ett-cross-dataset-publication.yml"
      - "examples/ett_variants_channel_permutation_publication.py"
      - "scripts/fetch_pinned_ett_variants.py"
      - "src/qrecon/attacks/gradient_release.py"
      - "src/qrecon/benchmarks/channel_permutation_fibre.py"
      - "src/qrecon/benchmarks/channel_permutation_release.py"
      - "src/qrecon/models/**"
      - "src/qrecon/theory/channel_permutation.py"
  pull_request:
    paths:
      - ".github/workflows/ett-cross-dataset-publication.yml"
      - "examples/ett_variants_channel_permutation_publication.py"
      - "scripts/fetch_pinned_ett_variants.py"
      - "src/qrecon/attacks/gradient_release.py"
      - "src/qrecon/benchmarks/channel_permutation_fibre.py"
      - "src/qrecon/benchmarks/channel_permutation_release.py"
      - "src/qrecon/models/**"
      - "src/qrecon/theory/channel_permutation.py"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  ettm2-etth1-modern-models:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e '.[test]'
      - name: Download and verify immutable ETTm2
        run: |
          python scripts/fetch_pinned_ett_variants.py ettm2 \
            --output data/ETT-small/ETTm2.csv \
            --manifest ettm2-source-manifest.json
      - name: Download and verify immutable ETTh1
        run: |
          python scripts/fetch_pinned_ett_variants.py etth1 \
            --output data/ETT-small/ETTh1.csv \
            --manifest etth1-source-manifest.json
      - name: Run 2-dataset by 2-architecture fibre and release matrix
        run: |
          set -o pipefail
          python examples/ett_variants_channel_permutation_publication.py \
            > ett-cross-dataset-channel-permutation.json \
            2> >(tee ett-cross-dataset-channel-permutation.stderr >&2)
      - name: Upload cross-dataset evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ett-cross-dataset-channel-permutation
          path: |
            ettm2-source-manifest.json
            etth1-source-manifest.json
            ett-cross-dataset-channel-permutation.json
            ett-cross-dataset-channel-permutation.stderr
          if-no-files-found: error
