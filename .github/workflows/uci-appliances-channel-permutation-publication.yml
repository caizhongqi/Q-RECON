name: uci-appliances-channel-permutation-publication

on:
  pull_request:
    paths:
      - "scripts/fetch_uci_appliances.py"
      - "examples/uci_appliances_channel_permutation_publication.py"
      - "examples/uci_appliances_batch_size_fibre.py"
      - "src/qrecon/attacks/**"
      - "src/qrecon/benchmarks/**"
      - "src/qrecon/data/**"
      - "src/qrecon/models/**"
      - "src/qrecon/theory/**"
      - ".github/workflows/uci-appliances-channel-permutation-publication.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: uci-appliances-publication-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  independent-real-dataset:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Q-RECON
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[test]'
      - name: Download and verify immutable UCI source
        run: |
          mkdir -p outputs
          python scripts/fetch_uci_appliances.py \
            --output-dir data/UCI-appliances \
            --manifest outputs/uci-appliances-source.json
      - name: Run focused symmetry and side-information tests
        run: |
          pytest -q \
            tests/test_channel_permutation_fibre.py \
            tests/test_channel_side_information.py
      - name: Run independent UCI publication matrix
        run: |
          python examples/uci_appliances_channel_permutation_publication.py \
            > outputs/uci-appliances-channel-permutation.json \
            2> outputs/uci-appliances-channel-permutation.stderr
      - name: Enforce publication quality gate
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(
              Path("outputs/uci-appliances-channel-permutation.json").read_text()
          )
          assert payload["quality_gate"]["passed"] is True
          assert payload["quality_gate"]["forty_primary_fibre_release_points"] is True
          assert payload["quality_gate"]["one_hundred_side_information_trials"] is True
          assert payload["source"]["csv_sha256"] == (
              "2820bf712ad0275cb18b85a05250926100d8e65ebb9f4d2d016ca91ea152a25d"
          )
          for report in payload["architectures"].values():
              assert report["quality_gate_passed"] is True
          print(json.dumps(payload["quality_gate"], indent=2, sort_keys=True))
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: uci-appliances-channel-permutation-publication
          path: |
            outputs/uci-appliances-source.json
            outputs/uci-appliances-channel-permutation.json
            outputs/uci-appliances-channel-permutation.stderr
          if-no-files-found: error

  batch-size-fibre:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Q-RECON
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[test]'
      - name: Download and verify immutable UCI source
        run: |
          mkdir -p outputs
          python scripts/fetch_uci_appliances.py \
            --output-dir data/UCI-appliances \
            --manifest outputs/uci-appliances-source.json
      - name: Verify fibre and batching contracts
        run: |
          pytest -q \
            tests/test_channel_permutation_fibre.py \
            tests/test_modern_time_series_models.py \
            --junitxml=outputs/uci-batch-size-fibre-tests.xml
      - name: Run batch-size fibre matrix
        run: |
          python examples/uci_appliances_batch_size_fibre.py \
            > outputs/uci-batch-size-fibre.json \
            2> outputs/uci-batch-size-fibre.stderr
      - name: Enforce batch-size quality gate
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("outputs/uci-batch-size-fibre.json").read_text())
          gate = payload["quality_gate"]
          assert gate["passed"] is True
          assert gate["immutable_non_ett_source"] is True
          assert gate["two_modern_architectures"] is True
          assert gate["predeclared_batch_sizes_1_2_4_8"] is True
          assert gate["ten_batches_per_cell"] is True
          assert gate["eighty_primary_fibre_points"] is True
          assert gate["all_orbits_equal_5040"] is True
          assert gate["all_fibre_quality_gates_passed"] is True
          assert payload["declaration"]["batch_sizes"] == [1, 2, 4, 8]
          assert payload["declaration"]["expected_total_points"] == 80
          assert len(payload["reports"]) == 8
          print(json.dumps(gate, indent=2, sort_keys=True))
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: uci-batch-size-fibre
          path: |
            outputs/uci-appliances-source.json
            outputs/uci-batch-size-fibre.json
            outputs/uci-batch-size-fibre.stderr
            outputs/uci-batch-size-fibre-tests.xml
          if-no-files-found: error
