name: tests

on:
  push:
    branches: [main, "agent/**"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e '.[test]'
      - name: Run tests
        run: pytest -q --junitxml=pytest-results-${{ matrix.python-version }}.xml
      - name: Run executable theory and compiler examples
        run: |
          python examples/theory_bounds.py > theory-bounds-${{ matrix.python-version }}.txt
          python examples/coherent_oracle_demo.py > coherent-oracle-${{ matrix.python-version }}.json
          python examples/oracle_scaling.py > oracle-scaling-${{ matrix.python-version }}.json
          python examples/affine_oracle_cost_report.py > affine-cost-${{ matrix.python-version }}.json
          python examples/mlp_oracle_demo.py > mlp-oracle-${{ matrix.python-version }}.json
          python examples/gradient_reconstruction_demo.py > gradient-reconstruction-${{ matrix.python-version }}.json
          python examples/batch_gradient_demo.py > batch-gradient-${{ matrix.python-version }}.json
          python examples/fixed_point_mlp_exact_observation.py > fixed-point-mlp-exact-${{ matrix.python-version }}.json
          python examples/unknown_k_search.py > unknown-k-search-${{ matrix.python-version }}.json
          python examples/unknown_k_cost_envelope.py > unknown-k-cost-${{ matrix.python-version }}.json
          python examples/fixed_point_benchmark_matrix.py > fixed-point-benchmark-${{ matrix.python-version }}.json
          python examples/fixed_point_statistical_report.py > fixed-point-statistics-${{ matrix.python-version }}.json
          python examples/fixed_point_manifest_report.py > fixed-point-manifest-${{ matrix.python-version }}.json
      - name: Compile Python sources
        if: always()
        run: python -m compileall -q src tests examples
      - name: Upload classical, theory, compiler, and benchmark reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: classical-theory-${{ matrix.python-version }}
          path: |
            pytest-results-${{ matrix.python-version }}.xml
            theory-bounds-${{ matrix.python-version }}.txt
            coherent-oracle-${{ matrix.python-version }}.json
            oracle-scaling-${{ matrix.python-version }}.json
            affine-cost-${{ matrix.python-version }}.json
            mlp-oracle-${{ matrix.python-version }}.json
            gradient-reconstruction-${{ matrix.python-version }}.json
            batch-gradient-${{ matrix.python-version }}.json
            fixed-point-mlp-exact-${{ matrix.python-version }}.json
            unknown-k-search-${{ matrix.python-version }}.json
            unknown-k-cost-${{ matrix.python-version }}.json
            fixed-point-benchmark-${{ matrix.python-version }}.json
            fixed-point-statistics-${{ matrix.python-version }}.json
            fixed-point-manifest-${{ matrix.python-version }}.json
          if-no-files-found: warn

  solver-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e '.[solver,test]'
      - name: Run exact SMT baseline tests
        run: |
          pytest -q \
            tests/test_z3_fixed_point_inversion.py \
            tests/test_z3_benchmark.py \
            --junitxml=z3-results.xml
      - name: Cross-check SMT, branch-and-bound, coherent verifier, and repeated manifests
        run: |
          set -o pipefail
          python examples/z3_fixed_point_inversion.py \
            > z3-fixed-point-inversion.json \
            2> >(tee z3-fixed-point-inversion.stderr >&2)
          python examples/fixed_point_benchmark_matrix.py --z3 \
            > z3-benchmark-matrix.json \
            2> >(tee z3-benchmark-matrix.stderr >&2)
          python examples/fixed_point_statistical_report.py --z3 \
            > z3-statistical-report.json \
            2> >(tee z3-statistical-report.stderr >&2)
          python examples/fixed_point_manifest_report.py --z3 \
            > z3-manifest-report.json \
            2> >(tee z3-manifest-report.stderr >&2)
      - name: Upload SMT baseline report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: z3-fixed-point-inversion
          path: |
            z3-results.xml
            z3-fixed-point-inversion.json
            z3-fixed-point-inversion.stderr
            z3-benchmark-matrix.json
            z3-benchmark-matrix.stderr
            z3-statistical-report.json
            z3-statistical-report.stderr
            z3-manifest-report.json
            z3-manifest-report.stderr
          if-no-files-found: warn

  quantum-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e '.[quantum,test]'
      - name: Run differentiable quantum-prior smoke test
        run: |
          python - <<'PY'
          import torch
          from qrecon.quantum import QuantumPrior

          torch.manual_seed(11)
          prior = QuantumPrior(
              shape=(1, 2),
              mode="timeseries",
              n_qubits=2,
              layers=1,
              hidden=4,
              shots=None,
          )
          output = prior()
          assert output.shape == (1, 2)
          loss = output.square().mean()
          loss.backward()
          gradients = [parameter.grad for parameter in prior.parameters()]
          assert gradients and all(gradient is not None for gradient in gradients)
          assert all(torch.isfinite(gradient).all() for gradient in gradients)
          print("quantum prior forward/backward smoke test passed")
          PY
