name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e '.[test]'
      - name: Run tests
        run: pytest -q --junitxml=pytest-results-${{ matrix.python-version }}.xml
      - name: Run executable theory examples
        run: |
          python examples/theory_bounds.py > theory-bounds-${{ matrix.python-version }}.txt
          python examples/coherent_oracle_demo.py > coherent-oracle-${{ matrix.python-version }}.json
          python examples/oracle_scaling.py > oracle-scaling-${{ matrix.python-version }}.json
      - name: Compile Python sources
        if: always()
        run: python -m compileall -q src tests examples
      - name: Upload classical and theory reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: classical-theory-${{ matrix.python-version }}
          path: |
            pytest-results-${{ matrix.python-version }}.xml
            theory-bounds-${{ matrix.python-version }}.txt
            coherent-oracle-${{ matrix.python-version }}.json
            oracle-scaling-${{ matrix.python-version }}.json
          if-no-files-found: warn

  quantum-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e '.[quantum,test]'
      - name: Run differentiable quantum-prior smoke test
        run: |
          python - <<'PY'
          import torch
          from qrecon.quantum import QuantumPrior

          torch.manual_seed(11)
          prior = QuantumPrior(
              shape=(1, 2),
              mode="timeseries",
              n_qubits=2,
              layers=1,
              hidden=4,
              shots=None,
          )
          output = prior()
          assert output.shape == (1, 2)
          loss = output.square().mean()
          loss.backward()
          gradients = [parameter.grad for parameter in prior.parameters()]
          assert gradients and all(gradient is not None for gradient in gradients)
          assert all(torch.isfinite(gradient).all() for gradient in gradients)
          print("quantum prior forward/backward smoke test passed")
          PY
