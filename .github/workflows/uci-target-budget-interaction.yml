name: uci-target-budget-interaction

on:
  pull_request:
    paths:
      - "scripts/fetch_uci_appliances.py"
      - "examples/uci_appliances_target_budget_interaction.py"
      - "src/qrecon/attacks/**"
      - "src/qrecon/metrics.py"
      - "src/qrecon/data/**"
      - "src/qrecon/models/**"
      - ".github/workflows/uci-target-budget-interaction.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: uci-target-budget-interaction-${{ github.event.pull_request.number || github.ref }}-${{ matrix.architecture }}
  cancel-in-progress: true

jobs:
  target-budget-interaction:
    runs-on: ubuntu-24.04
    timeout-minutes: 150
    strategy:
      fail-fast: false
      matrix:
        architecture: [itransformer, patchtst]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Q-RECON
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[test]'
      - name: Download and verify immutable UCI source
        run: |
          mkdir -p outputs
          python scripts/fetch_uci_appliances.py \
            --output-dir data/UCI-appliances \
            --manifest outputs/uci-appliances-source.json
      - name: Verify optimization and alignment contracts
        run: |
          pytest -q \
            tests/test_channel_alignment_metrics.py \
            tests/test_modern_time_series_models.py \
            tests/test_gradient_release.py \
            --junitxml=outputs/uci-target-budget-tests-${{ matrix.architecture }}.xml
      - name: Run private/public target and budget interaction matrix
        run: |
          python examples/uci_appliances_target_budget_interaction.py \
            --architecture ${{ matrix.architecture }} \
            > outputs/uci-target-budget-${{ matrix.architecture }}.json \
            2> outputs/uci-target-budget-${{ matrix.architecture }}.stderr
      - name: Enforce completeness gate
        run: |
          ARCHITECTURE='${{ matrix.architecture }}' python - <<'PY'
          import json
          import os
          from pathlib import Path

          architecture = os.environ["ARCHITECTURE"]
          payload = json.loads(
              Path(f"outputs/uci-target-budget-{architecture}.json").read_text()
          )
          gate = payload["quality_gate"]
          assert gate["passed"] is True
          assert gate["immutable_non_ett_source"] is True
          assert gate["modern_anonymous_channel_architecture"] is True
          assert gate["ten_paired_private_records"] is True
          assert gate["three_restarts_per_condition"] is True
          assert gate["predeclared_private400_public60_public400"] is True
          assert gate["all_ninety_attempts_completed"] is True
          assert gate["every_record_selected_in_every_condition"] is True
          assert set(payload["condition_summaries"]) == {
              "private_400",
              "public_60",
              "public_400",
          }
          assert set(payload["paired_interactions"]) == {
              "public_400_minus_private_400",
              "public_400_minus_public_60",
          }
          print(json.dumps(gate, indent=2, sort_keys=True))
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: uci-target-budget-interaction-${{ matrix.architecture }}
          path: |
            outputs/uci-appliances-source.json
            outputs/uci-target-budget-${{ matrix.architecture }}.json
            outputs/uci-target-budget-${{ matrix.architecture }}.stderr
            outputs/uci-target-budget-tests-${{ matrix.architecture }}.xml
          if-no-files-found: error
