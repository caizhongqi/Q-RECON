name: uci-appliances-channel-count-scaling

on:
  pull_request:
    paths:
      - "scripts/fetch_uci_appliances.py"
      - "examples/uci_appliances_channel_count_scaling.py"
      - "src/qrecon/models/**"
      - "src/qrecon/theory/channel_permutation.py"
      - "src/qrecon/data/**"
      - ".github/workflows/uci-appliances-channel-count-scaling.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  factorial-orbit:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        architecture: [itransformer, patchtst]
    concurrency:
      group: uci-channel-count-${{ github.event.pull_request.number || github.ref }}-${{ matrix.architecture }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Q-RECON
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[test]'
      - name: Download and verify immutable UCI source
        run: |
          python scripts/fetch_uci_appliances.py \
            --output-dir data/UCI-appliances \
            --manifest outputs/uci-appliances-source.json
      - name: Run exact channel-permutation tests
        run: |
          pytest -q \
            tests/test_channel_permutation_fibre.py \
            tests/test_channel_permutation_gradient.py
      - name: Run factorial channel-count scaling matrix
        run: |
          python examples/uci_appliances_channel_count_scaling.py \
            --architecture ${{ matrix.architecture }} \
            > outputs/uci-channel-count-${{ matrix.architecture }}.json \
            2> outputs/uci-channel-count-${{ matrix.architecture }}.stderr
      - name: Enforce factorial-orbit quality gate
        run: |
          ARCHITECTURE='${{ matrix.architecture }}' python - <<'PY'
          import json
          import math
          import os
          from pathlib import Path
          architecture = os.environ["ARCHITECTURE"]
          payload = json.loads(
              Path(f"outputs/uci-channel-count-{architecture}.json").read_text()
          )
          assert payload["quality_gate"]["passed"] is True
          assert payload["quality_gate"]["fifty_total_fibre_points"] is True
          counts = [cell["channel_count"] for cell in payload["cells"]]
          assert counts == [3, 5, 7, 9, 10]
          for cell in payload["cells"]:
              assert cell["expected_orbit_size"] == math.factorial(cell["channel_count"])
              assert cell["quality_gate_passed"] is True
          print(json.dumps(payload["quality_gate"], indent=2, sort_keys=True))
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: uci-appliances-channel-count-${{ matrix.architecture }}
          path: |
            outputs/uci-appliances-source.json
            outputs/uci-channel-count-${{ matrix.architecture }}.json
            outputs/uci-channel-count-${{ matrix.architecture }}.stderr
          if-no-files-found: error
