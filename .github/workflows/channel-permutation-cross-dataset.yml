name: channel-permutation-cross-dataset

on:
  pull_request:
    paths:
      - ".github/workflows/channel-permutation-cross-dataset.yml"
      - "examples/channel_permutation_cross_dataset_confirmatory.py"
      - "scripts/fetch_pinned_ett_variants.py"
      - "src/qrecon/attacks/gradient_release.py"
      - "src/qrecon/benchmarks/channel_permutation_fibre.py"
      - "src/qrecon/benchmarks/channel_permutation_release.py"
      - "src/qrecon/theory/channel_permutation.py"
      - "src/qrecon/models/**"
      - "tests/test_channel_permutation_gradient.py"
      - "tests/test_channel_permutation_release.py"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  three-dataset-confirmatory-study:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e '.[test]'
      - name: Verify fibre and release implementations
        run: |
          pytest -q \
            tests/test_channel_permutation_gradient.py \
            tests/test_channel_permutation_release.py \
            tests/test_modern_time_series_models.py \
            --junitxml=channel-cross-dataset-tests.xml
      - name: Download and verify immutable ETTm1
        run: |
          python scripts/fetch_pinned_ett_variants.py ettm1 \
            --output data/ETT-small/ETTm1.csv \
            --manifest ettm1-source-manifest.json
      - name: Download and verify immutable ETTm2
        run: |
          python scripts/fetch_pinned_ett_variants.py ettm2 \
            --output data/ETT-small/ETTm2.csv \
            --manifest ettm2-source-manifest.json
      - name: Download and verify immutable ETTh1
        run: |
          python scripts/fetch_pinned_ett_variants.py etth1 \
            --output data/ETT-small/ETTh1.csv \
            --manifest etth1-source-manifest.json
      - name: Run 60-window cross-dataset fibre and release study
        run: |
          set -o pipefail
          python examples/channel_permutation_cross_dataset_confirmatory.py \
            > channel-permutation-cross-dataset.json \
            2> >(tee channel-permutation-cross-dataset.stderr >&2)
      - name: Upload cross-dataset evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: channel-permutation-cross-dataset
          path: |
            channel-cross-dataset-tests.xml
            ettm1-source-manifest.json
            ettm2-source-manifest.json
            etth1-source-manifest.json
            channel-permutation-cross-dataset.json
            channel-permutation-cross-dataset.stderr
          if-no-files-found: error
