name: uci-appliances-side-information-sweep

on:
  pull_request:
    paths:
      - "scripts/fetch_uci_appliances.py"
      - "examples/uci_appliances_side_information_sweep.py"
      - "src/qrecon/benchmarks/channel_side_information.py"
      - "src/qrecon/data/**"
      - ".github/workflows/uci-appliances-side-information-sweep.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: uci-appliances-side-sweep-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  calibration-size-phase-diagram:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Q-RECON
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[test]'
      - name: Download and verify immutable UCI source
        run: |
          python scripts/fetch_uci_appliances.py \
            --output-dir data/UCI-appliances \
            --manifest outputs/uci-appliances-source.json
      - name: Run side-information unit tests
        run: pytest -q tests/test_channel_side_information.py
      - name: Run calibration-size phase diagram
        run: |
          python examples/uci_appliances_side_information_sweep.py \
            > outputs/uci-appliances-side-information-sweep.json \
            2> outputs/uci-appliances-side-information-sweep.stderr
      - name: Enforce phase-diagram quality gate
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(
              Path("outputs/uci-appliances-side-information-sweep.json").read_text()
          )
          assert payload["quality_gate"]["passed"] is True
          assert payload["quality_gate"]["seven_hundred_total_trials"] is True
          assert len(payload["curve"]) == 7
          assert [point["calibration_windows"] for point in payload["curve"]] == [
              1, 2, 5, 10, 20, 40, 60
          ]
          print(json.dumps(payload["curve"], indent=2, sort_keys=True))
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: uci-appliances-side-information-sweep
          path: |
            outputs/uci-appliances-source.json
            outputs/uci-appliances-side-information-sweep.json
            outputs/uci-appliances-side-information-sweep.stderr
          if-no-files-found: error
