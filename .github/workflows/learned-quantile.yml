name: learned-quantile-calibration

on:
  push:
    branches: ["agent/**"]
    paths:
      - ".github/workflows/learned-quantile.yml"
      - "src/qrecon/attacks/learned_quantile_initializer.py"
      - "src/qrecon/attacks/__init__.py"
      - "src/qrecon/benchmarks/learned_ts_inverse.py"
      - "src/qrecon/benchmarks/paired_learned_ts_inverse.py"
      - "src/qrecon/benchmarks/__init__.py"
      - "examples/gifteval_patchtst_learned_quantile_calibration.py"
      - "examples/gifteval_patchtst_paired_learned_calibration.py"
      - "tests/test_learned_quantile_initializer.py"
      - "tests/test_paired_learned_ts_inverse.py"
  pull_request:
    paths:
      - ".github/workflows/learned-quantile.yml"
      - "src/qrecon/attacks/learned_quantile_initializer.py"
      - "src/qrecon/benchmarks/learned_ts_inverse.py"
      - "src/qrecon/benchmarks/paired_learned_ts_inverse.py"
      - "examples/gifteval_patchtst_paired_learned_calibration.py"
      - "tests/test_learned_quantile_initializer.py"
      - "tests/test_paired_learned_ts_inverse.py"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  validate-and-calibrate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e '.[test]'
      - name: Run focused learned initializer tests
        run: |
          pytest -q \
            tests/test_learned_quantile_initializer.py \
            tests/test_paired_learned_ts_inverse.py \
            --junitxml=learned-quantile-tests.xml
      - name: Run 96-auxiliary-window paired calibration
        run: |
          python examples/gifteval_patchtst_paired_learned_calibration.py \
            > gifteval-patchtst-paired-learned-calibration.json
      - name: Upload paired calibration evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gifteval-patchtst-paired-learned-calibration
          path: |
            learned-quantile-tests.xml
            gifteval-patchtst-paired-learned-calibration.json
          if-no-files-found: error
